# Copy to config/qq_bot.yaml and fill in. Do not commit config/qq_bot.yaml.

# OneBot v11 (NapCat / Lagrange.OneBot / LLOneBot)
onebot_http_url: "http://127.0.0.1:3000"
onebot_ws_url: "ws://127.0.0.1:3001"
access_token: ""

# NapCat 登录的机器人 QQ 号（用户发消息给这个号即可触发指令）
bot_qq: 3691107632

# true = 任何用户私聊 bot_qq 都可执行指令（推荐：多人共用一个机器人入口）
# false = 仅 allowed_users 列表中的 QQ 号可发指令
allow_all_senders: true

# 仅当 allow_all_senders: false 时生效
allowed_users:
  - 3691107632

# 群聊白名单（留空 = 不处理群消息；填群号则该群内任意成员可发指令）
allowed_groups: []

# 默认值，可省略命令里的手机号/验证码/支付密码（按需填写）
default_mobile: "18935209286"
default_code: "-"
default_pay_password: ""

# 传给 run.py 的额外参数（与 config.yaml 里 USB 模式一致）
run_args:
  - "--usb"

# 单条指令最长执行时间（秒）；0 = 不限制（捡漏/合成等长任务可一直运行）
command_timeout: 0

# 同时运行的任务数上限；0 或不填 = 不限制（不同账号可并行）
max_concurrent_tasks: 0

# 点对点全自动：B 寄售后自动触发 A 购买（按寄售ID|藏品ID 批量直购）
# 键为卖家手机号；也可写成列表形式（见注释）
# p2p_auto:
#   "19965260715":
#     buyer_mobile: "13800138000"
#     buyer_code: "-"
#     buyer_pay_password: "123456"
# p2p_auto:
#   - seller: "19965260715"
#     buyer_mobile: "13800138000"
#     buyer_pay_password: "123456"
