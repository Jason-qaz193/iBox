# Copy to config.yaml and fill in. Do not commit config.yaml.

# Base URL for iBox API (no trailing slash)
base_url: "https://sail-api.ibox.art"

# RPC bridge connection (--rpc mode)
# WiFi mode (recommended, no USB needed): set to phone's IP on the same WiFi
# USB  mode (needs cable + adb forward):  leave as 127.0.0.1 or use --usb flag
device_host: "192.168.71.1"    # e.g. 192.168.1.88  (check Settings → WiFi → IP)

# Login path (confirmed from log analysis)
login:
  path: "/personal-center-service/login/mobile"
  method: POST
  c_id: ""   # device/channel ID — get from: capture → encBody → cId field

# SMS verification code path (confirmed from log: payload = {"phone":"...","smsType":"1"})
sms:
  path: "/personal-center-service/login/sendSms"

# NOTE: No key_file needed. Encryption is done by the app itself via rpc_bridge.js (RPC mode).
# Fallback pure-Python mode (--rpc not specified) uses crypto_utils.py, but
# the exact HTTP body format is still TBD — confirm with dump_chucker.sh or print_capture().

# Cart / prepare purchase (fill after capture)
cart:
  path: "/v1/cart/add"
  method: POST

# Create order / checkout
order:
  path: "/v1/order/create"
  method: POST

# Optional extra request headers
headers:
  User-Agent: "iBox/4.6.0 (Android)"
  Content-Type: "application/json"
